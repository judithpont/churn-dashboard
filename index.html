<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Dashboard de Churn Modjo</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <style>
    :root {
      --bg:#f2f5eb; --accent:#85D630; --accent-dark:#6ab820;
      --card:#ffffff; --text:#1a1a1a; --muted:#6b7280;
      --border:#e5e7eb; --danger:#ef4444; --warning:#f59e0b; --success:#22c55e;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
    .header{background:#1a1a1a;color:white;padding:16px 24px;display:flex;align-items:center;gap:12px;}
    .header-logo{width:36px;height:36px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:18px;color:#1a1a1a;}
    .header h1{font-size:18px;font-weight:700;}
    .header-sub{font-size:12px;color:#9ca3af;margin-left:auto;}
    .main-tabs{background:white;border-bottom:2px solid var(--border);padding:0 24px;display:flex;}
    .main-tab{padding:14px 20px;font-size:14px;font-weight:500;cursor:pointer;color:var(--muted);border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .2s;}
    .main-tab.active{color:var(--text);border-bottom-color:var(--accent);}
    .main-tab:hover{color:var(--text);}
    .sub-tabs{background:var(--bg);padding:12px 24px 0;display:flex;gap:8px;}
    .sub-tab{padding:8px 16px;font-size:13px;font-weight:500;cursor:pointer;color:var(--muted);background:white;border:1px solid var(--border);border-radius:20px;transition:all .2s;}
    .sub-tab.active{background:var(--accent);color:#1a1a1a;border-color:var(--accent);}
    .sub-tab:hover:not(.active){border-color:var(--accent);color:var(--text);}
    .filter-bar{background:white;border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
    .filter-bar select{padding:7px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;background:white;color:var(--text);cursor:pointer;min-width:140px;}
    .filter-bar select:focus{outline:none;border-color:var(--accent);}
    .period-btns{display:flex;gap:4px;margin-left:auto;}
    .period-btn{padding:7px 12px;border:1px solid var(--border);border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;background:white;color:var(--muted);transition:all .2s;}
    .period-btn.active{background:var(--accent);color:#1a1a1a;border-color:var(--accent);}
    .date-inputs{display:flex;gap:8px;align-items:center;font-size:12px;color:var(--muted);}
    .date-inputs input{padding:7px 10px;border:1px solid var(--border);border-radius:8px;font-size:12px;}
    .content{padding:24px;}
    .kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px;}
    .kpi-card{background:white;border-radius:12px;padding:20px;border:1px solid var(--border);}
    .kpi-label{font-size:12px;color:var(--muted);font-weight:500;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;}
    .kpi-value{font-size:32px;font-weight:800;line-height:1;margin-bottom:4px;}
    .kpi-sub{font-size:12px;color:var(--muted);}
    .kpi-churn .kpi-value{color:var(--danger);}
    .kpi-ok .kpi-value{color:var(--success);}
    .kpi-rate .kpi-value{color:var(--warning);}
    .section-title{font-size:16px;font-weight:700;margin-bottom:16px;}
    .malBien-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px;}
    .malBien-card{background:white;border-radius:12px;padding:20px;border:1px solid var(--border);}
    .malBien-card h3{font-size:14px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:6px;}
    .malBien-card ul{list-style:none;display:flex;flex-direction:column;gap:8px;}
    .malBien-card li{font-size:13px;color:var(--muted);display:flex;align-items:flex-start;gap:8px;line-height:1.4;}
    .bullet{width:6px;height:6px;border-radius:50%;margin-top:5px;flex-shrink:0;}
    .chart-section{background:white;border-radius:12px;padding:20px;border:1px solid var(--border);margin-bottom:24px;}
    .chart-bars{display:flex;flex-direction:column;gap:10px;margin-top:12px;}
    .chart-bar-row{display:flex;align-items:center;gap:12px;font-size:13px;}
    .chart-bar-label{width:170px;flex-shrink:0;display:flex;align-items:center;gap:6px;}
    .chart-bar-track{flex:1;height:24px;background:var(--bg);border-radius:6px;overflow:hidden;}
    .chart-bar-fill{height:100%;background:var(--accent);border-radius:6px;transition:width .4s;display:flex;align-items:center;padding-left:8px;font-size:11px;font-weight:600;color:#1a1a1a;min-width:28px;}
    .chart-bar-count{width:50px;text-align:right;font-weight:600;color:var(--muted);font-size:12px;}
    .insights-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px;}
    .insight-card{background:white;border-radius:12px;padding:16px;border:1px solid var(--border);}
    .insight-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
    .insight-cat{font-size:13px;font-weight:700;display:flex;align-items:center;gap:4px;}
    .insight-badge{font-size:11px;font-weight:700;padding:3px 8px;border-radius:20px;}
    .badge-danger{background:#fee2e2;color:#dc2626;}
    .badge-warning{background:#fef3c7;color:#d97706;}
    .badge-ok{background:#dcfce7;color:#16a34a;}
    .badge-neutral{background:var(--bg);color:var(--muted);}
    .insight-count{font-size:24px;font-weight:800;margin-bottom:4px;}
    .insight-sub{font-size:11px;color:var(--muted);}
    .insight-clients{margin-top:8px;font-size:11px;color:var(--muted);line-height:1.5;}
    /* Info tooltip */
    .info-wrap{position:relative;display:inline-flex;align-items:center;}
    .info-btn{width:15px;height:15px;border-radius:50%;background:#e5e7eb;color:var(--muted);font-size:9px;font-weight:700;border:none;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;line-height:1;}
    .info-btn:hover+.tooltip,.info-btn:focus+.tooltip{display:block;}
    .tooltip{display:none;position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:#1a1a1a;color:white;font-size:11px;padding:10px 12px;border-radius:8px;width:240px;z-index:999;line-height:1.6;font-weight:400;pointer-events:none;white-space:normal;}
    .tooltip::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:6px solid transparent;border-top-color:#1a1a1a;}
    .tooltip strong{color:var(--accent);display:block;margin-bottom:4px;}
    /* Owners */
    .owners-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
    .owner-card{background:white;border-radius:12px;padding:20px;border:2px solid var(--border);}
    .owner-name{font-size:15px;font-weight:700;margin-bottom:4px;}
    .owner-meta{font-size:12px;color:var(--muted);margin-bottom:12px;}
    .owner-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
    .owner-stat{text-align:center;}
    .owner-stat-val{font-size:20px;font-weight:800;}
    .owner-stat-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;}
    /* Table */
    .table-wrap{background:white;border-radius:12px;border:1px solid var(--border);overflow:hidden;}
    table{width:100%;border-collapse:collapse;font-size:13px;}
    th{background:var(--bg);padding:12px 16px;text-align:left;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);border-bottom:1px solid var(--border);}
    td{padding:12px 16px;border-bottom:1px solid var(--border);vertical-align:top;}
    tr:last-child td{border-bottom:none;}
    tr:hover td{background:#fafafa;}
    .churn-badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;}
    .churn-si{background:#fee2e2;color:#dc2626;}
    .churn-no{background:#dcfce7;color:#16a34a;}
    .cat-badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;background:#e0f2fe;color:#0369a1;}
    .expand-btn{cursor:pointer;background:none;border:none;font-size:16px;color:var(--muted);padding:0;line-height:1;}
    .xi{display:none;padding:12px 16px;background:#f9fafb;border-top:1px solid var(--border);font-size:12px;line-height:1.6;color:#374151;}
    .xi.open{display:block;}
    .loading{text-align:center;padding:60px;color:var(--muted);}
    .spinner{display:inline-block;width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:12px;}
    @keyframes spin{to{transform:rotate(360deg);}}
    @media(max-width:768px){
      .kpi-row{grid-template-columns:repeat(2,1fr);}
      .insights-grid{grid-template-columns:repeat(2,1fr);}
      .owners-grid{grid-template-columns:1fr;}
      .malBien-grid{grid-template-columns:1fr;}
    }
  </style>
</head>
<body>

<div class="header">
  <div class="header-logo">P</div>
  <h1>Dashboard de Churn Modjo</h1>
  <span class="header-sub" id="lastUpdate">Actualizando…</span>
</div>

<div class="main-tabs">
  <div class="main-tab active" onclick="switchMain('dashboard')">Dashboard</div>
  <div class="main-tab" onclick="switchMain('tabla')">Tabla</div>
</div>

<div class="sub-tabs" id="subTabsRow">
  <div class="sub-tab active" onclick="switchSub('insights')">Insights</div>
  <div class="sub-tab" onclick="switchSub('owners')">Owners</div>
</div>

<div class="filter-bar">
  <select id="fOwner" onchange="applyFilters()"><option value="">Todos los owners</option></select>
  <select id="fCat" onchange="applyFilters()"><option value="">Todas las categorías</option></select>
  <select id="fChurn" onchange="applyFilters()">
    <option value="">Churn + No churn</option>
    <option value="si">Solo churn</option>
    <option value="no">Sin churn</option>
  </select>
  <div class="period-btns">
    <button class="period-btn active" onclick="setPeriod('7d',this)">7d</button>
    <button class="period-btn" onclick="setPeriod('30d',this)">30d</button>
    <button class="period-btn" onclick="setPeriod('90d',this)">90d</button>
    <button class="period-btn" onclick="setPeriod('all',this)">Todo</button>
  </div>
  <div class="date-inputs">
    <input type="date" id="dFrom" onchange="applyFilters()"/>
    <span>→</span>
    <input type="date" id="dTo" onchange="applyFilters()"/>
  </div>
</div>

<div class="content">
  <div id="loadingDiv" class="loading"><div class="spinner"></div><br>Cargando datos…</div>

  <div id="viewInsights" style="display:none">
    <div class="kpi-row" id="kpiRow"></div>
    <div class="malBien-grid" id="malBienGrid"></div>
    <div class="chart-section">
      <div class="section-title">Distribución por categoría</div>
      <div class="chart-bars" id="chartBars"></div>
    </div>
    <div class="section-title">Detalle por categoría</div>
    <div class="insights-grid" id="insightsGrid"></div>
  </div>

  <div id="viewOwners" style="display:none">
    <div class="kpi-row" id="kpiRowOwners"></div>
    <div class="section-title">Rendimiento por owner</div>
    <div class="owners-grid" id="ownersGrid"></div>
  </div>

  <div id="viewTabla" style="display:none">
    <div class="table-wrap">
      <table id="mainTable">
        <thead>
          <tr>
            <th></th><th>Fecha</th><th>Cliente</th><th>Owner</th>
            <th>Categoría</th><th>Churn</th><th>Resumen IA</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
const SHEET_URL='https://docs.google.com/spreadsheets/d/e/2PACX-1vSgZgcbRQZ0sa1BU7Pv1TKwqo_CDyHEPcdcGZF3DtUuH_vNmZsjbrO5puLarjMCDtCsiF0SjIFFk0Jy/pub?output=csv';

const DUENOS_DISPLAY=['Victor Ortega','Óscar Lopo','Gonzalo Rosales','Franco Ferretti','Kamila Jiménez','Martina Benalcazar'];

const CAT_KW={
  'Fallos técnicos':   ['error','fallo','bug','técnico','tecnico','no funciona','no carga','caída','caida','problema técnico','lento','desconect','sincroniz','plataforma caída'],
  'Onboarding':        ['onboarding','no sabe','no entiende','cómo funciona','como funciona','configurar','vincular','primer','empezar','setup','inicio','arrancar'],
  'Sin resultados':    ['sin resultado','no resultado','no sirve','no veo','no consigo','no llega','no genera','alcance','engagement','no justifica','no vale'],
  'Contenido':         ['contenido','publicación','publicacion','post','copy','texto','imagen','creativo','calidad','genérico','generico','no encaja','marca','tono','estilo','chatgpt'],
  'Soporte':           ['soporte','respuesta','no contesta','no responden','tarda','espera','atención','atencion','ticket','ayuda','nadie','no atiende'],
  'Facturación':       ['factura','cobro','precio','pago','cargo','coste','costo','dinero','tarifa','plan','renovación','renovacion','cancelar','baja'],
  'Limitaciones':      ['limitación','limitacion','no puede','no soporta','no permite','linkedin','red social','idioma','catalán','catalan','móvil','movil','subir','adjuntar','funcionalidad'],
  'Razones externas':  ['externo','personal','agencia','crisis','económ','econom','trasladar','tiempo','prioridad','presupuesto','otra empresa','competencia']
};

const CAT_EXAMPLES={
  'Fallos técnicos':  '<strong>¿Qué significa?</strong>El cliente tiene un problema técnico que impide usar el servicio.<br>· "Llevo una semana sin que se publiquen mis posts"<br>· "Vinculé Facebook pero sigue sin conectarse"<br>· "La plataforma va muy lenta"',
  'Onboarding':       '<strong>¿Qué significa?</strong>El cliente no entiende cómo funciona el servicio.<br>· "No sé cómo pedir que cambiéis una publicación"<br>· "¿Cómo funciona el proceso de aprobación?"<br>· "Llevo un mes y no he vinculado mis cuentas"',
  'Sin resultados':   '<strong>¿Qué significa?</strong>El cliente no ve retorno ni mejora en su negocio.<br>· "Llevo 3 meses y no he conseguido clientes nuevos"<br>· "Mis publicaciones antes tenían más alcance"<br>· "No justifica lo que pago"',
  'Contenido':        '<strong>¿Qué significa?</strong>Las propuestas no encajan con su negocio o marca.<br>· "Esto parece de ChatGPT, no encaja con mi marca"<br>· "Me mandáis contenido genérico que no refleja mi estilo"<br>· "No capta mi tono ni mi sector"',
  'Soporte':          '<strong>¿Qué significa?</strong>El cliente no recibe respuesta o atención adecuada.<br>· "Mandé un mensaje hace 5 días y nadie contestó"<br>· "Cada vez hablo con alguien distinto"<br>· "Llevo 20 propuestas pendientes sin feedback"',
  'Facturación':      '<strong>¿Qué significa?</strong>Sorpresa o conflicto con un cobro.<br>· "Me cobrasteis y pensaba que era una prueba gratuita"<br>· "No sabía que cancelar requería avisar con 20 días"<br>· "Recibí un cargo inesperado"',
  'Limitaciones':     '<strong>¿Qué significa?</strong>La plataforma no puede hacer algo que el cliente necesita.<br>· "Necesito gestionar LinkedIn y no podéis"<br>· "No puedo subir archivos desde el ordenador"<br>· "Tengo el negocio en catalán y no lo resolvéis"',
  'Razones externas': '<strong>¿Qué significa?</strong>Se va pero no es culpa del servicio.<br>· "Paso por una crisis económica y recorto gastos"<br>· "He contratado una agencia que lleva toda mi comunicación"<br>· "Me traslado y no tengo tiempo"'
};

const CHURN_KW=['churn','churna','churned','se va','se fue','cancela','cancelo','canceló','baja','dar de baja','no renueva','rescinde','termina contrato','no continúa','no continua'];

let allRows=[],filteredRows=[],currentMain='dashboard',currentSub='insights',currentPeriod='7d';

function norm(s){return(s||'').toLowerCase().trim().normalize('NFD').replace(/\p{Diacritic}/gu,'');}

function col(row,...names){
  for(const n of names){
    for(const k of Object.keys(row)){
      if(norm(k)===norm(n)&&row[k]!==undefined&&row[k]!=='')return row[k];
    }
  }
  return '';
}

function canonicalOwner(s){
  const sn=norm(s||'');
  const map=[
    {keys:['victor','ortega'],          name:'Victor Ortega'},
    {keys:['oscar','lopo'],             name:'Óscar Lopo'},
    {keys:['gonzalo','rosales'],        name:'Gonzalo Rosales'},
    {keys:['franco','ferretti'],        name:'Franco Ferretti'},
    {keys:['kamila','jimenez'],         name:'Kamila Jiménez'},
    {keys:['martina','benalcazar'],     name:'Martina Benalcazar'}
  ];
  for(const e of map){if(e.keys.some(k=>sn.includes(norm(k))))return e.name;}
  return null;
}

function detCat(t){
  const tn=norm(t||'');
  for(const[cat,kws]of Object.entries(CAT_KW)){
    if(kws.some(k=>tn.includes(norm(k))))return cat;
  }
  return 'Sin resultados';
}

function detChurn(t){
  const tn=norm(t||'');
  return CHURN_KW.some(k=>tn.includes(norm(k)));
}

function parseDate(s){
  if(!s)return null;
  const parts=s.split(/[\/\-\.]/);
  if(parts.length===3){
    let[a,b,c]=parts;
    if(a.length===4)return new Date(+a,+b-1,+c);
    if(c.length===4)return new Date(+c,+b-1,+a);
    return new Date(+c+2000,+b-1,+a);
  }
  const d=new Date(s);return isNaN(d)?null:d;
}

function procesarDatos(raw){
  const rows=[],seen=new Set();
  for(const r of raw){
    const duenoBruto=col(r,'Dueño','Dueno','Owner','dueño','dueno','owner');
    const participantes=col(r,'Participantes','participantes','Participants');
    const transcript=col(r,'Transcript','transcript','Transcripción','transcripcion');
    const summary=col(r,'Resumen IA','resumen ia','Resumen Ia','RESUMEN IA','Summary','summary','Resumen','resumen');
    const fechaStr=col(r,'Fecha','fecha','Date','date');

    let owner=canonicalOwner(duenoBruto);
    if(!owner){
      for(const d of DUENOS_DISPLAY){
        if(participantes&&norm(participantes).includes(norm(d))){owner=d;break;}
      }
    }
    if(!owner)continue;

    let cliente='';
    if(participantes){
      const parts=participantes.split(',').map(p=>p.replace(/[\[\]]/g,'').trim()).filter(Boolean);
      for(const part of parts){
        if(!canonicalOwner(part)){cliente=part;break;}
      }
    }
    if(!cliente)cliente='Desconocido';

    const combined=(transcript||'')+' '+(summary||'');
    const categoria=detCat(combined);
    const esChurn=detChurn(combined);
    const fecha=parseDate(fechaStr);
    const displayText=summary||transcript||'';
    const key=norm(cliente)+'_'+fechaStr+'_'+norm(owner);
    if(seen.has(key))continue;
    seen.add(key);
    rows.push({owner,cliente,categoria,esChurn,fecha,fechaStr,displayText});
  }
  return rows;
}

function applyFilters(){
  const fOwner=document.getElementById('fOwner').value;
  const fCat=document.getElementById('fCat').value;
  const fChurn=document.getElementById('fChurn').value;
  const dFrom=document.getElementById('dFrom').value?new Date(document.getElementById('dFrom').value):null;
  const dTo=document.getElementById('dTo').value?new Date(document.getElementById('dTo').value):null;
  let periodFrom=null;
  const now=new Date();
  if(currentPeriod==='7d'){periodFrom=new Date(now);periodFrom.setDate(now.getDate()-7);}
  else if(currentPeriod==='30d'){periodFrom=new Date(now);periodFrom.setDate(now.getDate()-30);}
  else if(currentPeriod==='90d'){periodFrom=new Date(now);periodFrom.setDate(now.getDate()-90);}
  filteredRows=allRows.filter(r=>{
    if(fOwner&&r.owner!==fOwner)return false;
    if(fCat&&r.categoria!==fCat)return false;
    if(fChurn==='si'&&!r.esChurn)return false;
    if(fChurn==='no'&&r.esChurn)return false;
    if(r.fecha){
      if(periodFrom&&r.fecha<periodFrom)return false;
      if(dFrom&&r.fecha<dFrom)return false;
      if(dTo){const dt=new Date(dTo);dt.setDate(dt.getDate()+1);if(r.fecha>dt)return false;}
    }
    return true;
  });
  render();
}

function setPeriod(p,btn){
  currentPeriod=p;
  document.querySelectorAll('.period-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}

function renderKPI(id){
  const total=filteredRows.length;
  const churns=filteredRows.filter(r=>r.esChurn).length;
  const ok=total-churns;
  const rate=total?Math.round(churns/total*100):0;
  document.getElementById(id).innerHTML=`
    <div class="kpi-card"><div class="kpi-label">Total llamadas</div><div class="kpi-value">${total}</div><div class="kpi-sub">en el período</div></div>
    <div class="kpi-card kpi-churn"><div class="kpi-label">Churn detectado</div><div class="kpi-value">${churns}</div><div class="kpi-sub">llamadas con churn</div></div>
    <div class="kpi-card kpi-ok"><div class="kpi-label">Sin churn</div><div class="kpi-value">${ok}</div><div class="kpi-sub">llamadas OK</div></div>
    <div class="kpi-card kpi-rate"><div class="kpi-label">Tasa de churn</div><div class="kpi-value">${rate}%</div><div class="kpi-sub">del total</div></div>`;
}

function dynBadge(c,t){
  if(!t)return'<span class="insight-badge badge-neutral">Sin datos</span>';
  const r=c/t;
  if(r>=0.5)return'<span class="insight-badge badge-danger">Alto riesgo</span>';
  if(r>=0.25)return'<span class="insight-badge badge-warning">Moderado</span>';
  if(r>0)return'<span class="insight-badge badge-ok">Bajo riesgo</span>';
  return'<span class="insight-badge badge-neutral">Sin churn</span>';
}

function dynClients(rows){
  const names=[...new Set(rows.filter(r=>r.esChurn).map(r=>r.cliente))].slice(0,3);
  if(!names.length)return'';
  return`<div class="insight-clients">↑ Churns: ${names.join(', ')}${rows.filter(r=>r.esChurn).length>3?'…':''}</div>`;
}

function infoBtn(cat){
  const ex=CAT_EXAMPLES[cat]||'';
  return`<span class="info-wrap"><button class="info-btn" tabindex="0">?</button><span class="tooltip">${ex}</span></span>`;
}

function renderInsights(){
  const cats=Object.keys(CAT_KW).concat(['Sin resultados']);
  const cc={};
  cats.forEach(c=>{cc[c]={total:0,churn:0};});
  filteredRows.forEach(r=>{if(cc[r.categoria]){cc[r.categoria].total++;if(r.esChurn)cc[r.categoria].churn++;}});

  const sorted=cats.filter(c=>cc[c].total>0).sort((a,b)=>cc[b].churn-cc[a].churn);
  const mal=sorted.slice(0,3);
  const bien=sorted.filter(c=>cc[c].churn===0).slice(0,3);

  document.getElementById('malBienGrid').innerHTML=`
    <div class="malBien-card">
      <h3><span style="font-size:18px">⚠️</span> Lo que estamos haciendo mal</h3>
      <ul>${mal.length?mal.map(c=>`<li><span class="bullet" style="background:#ef4444"></span>${c}: ${cc[c].churn} churns de ${cc[c].total} llamadas</li>`).join(''):'<li><span class="bullet" style="background:#ef4444"></span>Sin datos suficientes</li>'}</ul>
    </div>
    <div class="malBien-card">
      <h3><span style="font-size:18px">✅</span> Lo que estamos haciendo bien</h3>
      <ul>${bien.length?bien.map(c=>`<li><span class="bullet" style="background:#22c55e"></span>${c}: ${cc[c].total} llamadas sin churn</li>`).join(''):'<li><span class="bullet" style="background:#22c55e"></span>Sin churns detectados</li>'}</ul>
    </div>`;

  const maxC=Math.max(...cats.map(c=>cc[c].total),1);
  document.getElementById('chartBars').innerHTML=cats.filter(c=>cc[c].total>0).map(c=>`
    <div class="chart-bar-row">
      <div class="chart-bar-label">${infoBtn(c)}<span>${c}</span></div>
      <div class="chart-bar-track"><div class="chart-bar-fill" style="width:${Math.max(cc[c].total/maxC*100,5)}%">${cc[c].total}</div></div>
      <div class="chart-bar-count">${cc[c].churn>0?'<span style="color:#ef4444">'+cc[c].churn+' ↓</span>':''}</div>
    </div>`).join('');

  document.getElementById('insightsGrid').innerHTML=cats.map(c=>{
    const rows=filteredRows.filter(r=>r.categoria===c);
    const ch=rows.filter(r=>r.esChurn);
    return`
      <div class="insight-card">
        <div class="insight-card-header">
          <span class="insight-cat">${infoBtn(c)}<span>${c}</span></span>
          ${dynBadge(ch.length,rows.length)}
        </div>
        <div class="insight-count">${rows.length}</div>
        <div class="insight-sub">${ch.length} churn${ch.length!==1?'s':''}</div>
        ${dynClients(rows)}
      </div>`;
  }).join('');
}

function renderOwners(){
  renderKPI('kpiRowOwners');
  document.getElementById('ownersGrid').innerHTML=DUENOS_DISPLAY.map(owner=>{
    const rows=filteredRows.filter(r=>r.owner===owner);
    const churns=rows.filter(r=>r.esChurn).length;
    const rate=rows.length?Math.round(churns/rows.length*100):0;
    const bc=rate>=50?'#ef4444':rate>=25?'#f59e0b':'#22c55e';
    const topCats={};
    rows.forEach(r=>{topCats[r.categoria]=(topCats[r.categoria]||0)+1;});
    const topCat=Object.entries(topCats).sort((a,b)=>b[1]-a[1])[0];
    return`
      <div class="owner-card" style="border-color:${bc}">
        <div class="owner-name">${owner}</div>
        <div class="owner-meta">${topCat?'Top: '+topCat[0]:'Sin datos'}</div>
        <div class="owner-stats">
          <div class="owner-stat"><div class="owner-stat-val">${rows.length}</div><div class="owner-stat-lbl">Llamadas</div></div>
          <div class="owner-stat"><div class="owner-stat-val" style="color:#ef4444">${churns}</div><div class="owner-stat-lbl">Churns</div></div>
          <div class="owner-stat"><div class="owner-stat-val" style="color:${bc}">${rate}%</div><div class="owner-stat-lbl">Tasa</div></div>
        </div>
      </div>`;
  }).join('');
}

function toggleDetail(id){
  const el=document.getElementById('xi_'+id);
  if(el)el.classList.toggle('open');
}

function buildRows(rows){
  return rows.map((r,i)=>`
    <tr>
      <td><button class="expand-btn" onclick="toggleDetail(${i})">▸</button></td>
      <td>${r.fechaStr||'–'}</td>
      <td>${r.cliente}</td>
      <td>${r.owner}</td>
      <td><span class="cat-badge">${r.categoria}</span></td>
      <td><span class="churn-badge ${r.esChurn?'churn-si':'churn-no'}">${r.esChurn?'Sí':'No'}</span></td>
      <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${(r.displayText||'').substring(0,80)}${r.displayText&&r.displayText.length>80?'…':''}</td>
    </tr>
    <tr><td colspan="7"><div class="xi" id="xi_${i}">${r.displayText||'Sin resumen disponible'}</div></td></tr>`).join('');
}

function renderTabla(){
  document.getElementById('tableBody').innerHTML=buildRows(filteredRows);
}

function render(){
  if(currentMain==='dashboard'){
    document.getElementById('subTabsRow').style.display='flex';
    if(currentSub==='insights'){
      document.getElementById('viewInsights').style.display='block';
      document.getElementById('viewOwners').style.display='none';
      document.getElementById('viewTabla').style.display='none';
      renderKPI('kpiRow');
      renderInsights();
    } else {
      document.getElementById('viewInsights').style.display='none';
      document.getElementById('viewOwners').style.display='block';
      document.getElementById('viewTabla').style.display='none';
      renderOwners();
    }
  } else {
    document.getElementById('subTabsRow').style.display='none';
    document.getElementById('viewInsights').style.display='none';
    document.getElementById('viewOwners').style.display='none';
    document.getElementById('viewTabla').style.display='block';
    renderTabla();
  }
}

function switchMain(tab){
  currentMain=tab;
  document.querySelectorAll('.main-tab').forEach((t,i)=>t.classList.toggle('active',['dashboard','tabla'][i]===tab));
  render();
}

function switchSub(tab){
  currentSub=tab;
  document.querySelectorAll('.sub-tab').forEach((t,i)=>t.classList.toggle('active',['insights','owners'][i]===tab));
  render();
}

function initFilters(){
  document.getElementById('fOwner').innerHTML='<option value="">Todos los owners</option>'+DUENOS_DISPLAY.map(d=>`<option value="${d}">${d}</option>`).join('');
  const cats=Object.keys(CAT_KW).concat(['Sin resultados']);
  document.getElementById('fCat').innerHTML='<option value="">Todas las categorías</option>'+cats.map(c=>`<option value="${c}">${c}</option>`).join('');
}

async function loadData(){
  try{
    Papa.parse(SHEET_URL,{
      download:true,header:true,skipEmptyLines:true,
      complete:function(results){
        allRows=procesarDatos(results.data);
        const dates=allRows.filter(r=>r.fecha).map(r=>r.fecha);
        if(dates.length){
          const maxDate=new Date(Math.max(...dates));
          document.getElementById('lastUpdate').textContent='Última actualización: '+maxDate.toLocaleDateString('es-ES');
        } else {
          document.getElementById('lastUpdate').textContent=allRows.length+' registros cargados';
        }
        document.getElementById('loadingDiv').style.display='none';
        initFilters();
        applyFilters();
      },
      error:function(err){
        document.getElementById('loadingDiv').innerHTML='<p style="color:#ef4444">Error cargando datos: '+err.message+'</p>';
      }
    });
  }catch(e){
    document.getElementById('loadingDiv').innerHTML='<p style="color:#ef4444">Error: '+e.message+'</p>';
  }
}

window.addEventListener('load',loadData);
</script>
</body>
</html>
