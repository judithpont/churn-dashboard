<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard de Churn — Revenue Ops</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <style>
    :root {
      --bg:#f2f5eb; --accent:#85D630; --accent-dark:#6ab520;
      --text:#1a2e0e; --card:#fff; --border:#e2e8d0; --muted:#7a8a6a;
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);}
    header{background:var(--card);border-bottom:3px solid var(--accent);padding:14px 32px;display:flex;align-items:center;justify-content:space-between;}
    .logo{font-size:22px;font-weight:800;letter-spacing:-1px;} .logo span{color:var(--accent);}
    .meta{font-size:12px;color:var(--muted);text-align:right;line-height:1.6;}
    .main-tabs{background:var(--card);border-bottom:1px solid var(--border);padding:0 32px;display:flex;gap:2px;}
    .main-tab{padding:13px 20px;font-size:14px;font-weight:600;cursor:pointer;border-bottom:3px solid transparent;color:var(--muted);transition:all .2s;user-select:none;}
    .main-tab.active{color:var(--accent-dark);border-bottom-color:var(--accent);}
    .main-tab:hover:not(.active){color:var(--text);}
    .sub-bar{background:var(--bg);padding:10px 32px;display:none;gap:8px;align-items:center;border-bottom:1px solid var(--border);}
    .sub-tab{padding:7px 18px;font-size:13px;font-weight:600;cursor:pointer;border-radius:20px;background:var(--card);border:1px solid var(--border);color:var(--muted);transition:all .2s;user-select:none;}
    .sub-tab.active{background:var(--accent);color:#fff;border-color:var(--accent);}
    .date-bar{background:var(--card);border-bottom:1px solid var(--border);padding:10px 32px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
    .date-bar label{font-size:13px;font-weight:600;color:var(--muted);}
    .pbtn{padding:5px 14px;border-radius:20px;border:1px solid var(--border);background:#fff;font-size:13px;cursor:pointer;font-weight:500;transition:all .2s;}
    .pbtn.active{background:var(--accent);color:#fff;border-color:var(--accent);}
    .dsep{color:var(--muted);font-size:12px;}
    input[type=date]{padding:5px 10px;border-radius:8px;border:1px solid var(--border);font-size:13px;background:#fff;color:var(--text);}
    .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;padding:20px 32px 0;}
    .kpi{background:var(--card);border-radius:12px;padding:18px 20px;box-shadow:0 1px 4px rgba(0,0,0,.06);}
    .kpi .lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;font-weight:600;margin-bottom:6px;}
    .kpi .val{font-size:30px;font-weight:800;}
    .kpi .sub{font-size:12px;color:var(--muted);margin-top:3px;}
    .kpi.red .val{color:#E53E3E;} .kpi.amb .val{color:#D97706;} .kpi.grn .val{color:var(--accent-dark);}
    .content{padding:20px 32px 48px;}
    /* owners */
    .og{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
    .oc{background:var(--card);border-radius:12px;padding:20px;box-shadow:0 1px 4px rgba(0,0,0,.06);border-top:4px solid #ccc;}
    .oc.br{border-top-color:#E53E3E;} .oc.ba{border-top-color:#D97706;} .oc.bg{border-top-color:var(--accent);}
    .oname{font-size:16px;font-weight:700;margin-bottom:2px;}
    .orate{font-size:13px;color:var(--muted);margin-bottom:10px;}
    .ostats{display:flex;gap:16px;margin-bottom:12px;}
    .ostat .n{font-size:22px;font-weight:800;} .ostat .l{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;}
    .ostat.red .n{color:#E53E3E;} .ostat.grn .n{color:var(--accent-dark);}
    .mtag{display:inline-block;background:#eef7e0;color:var(--accent-dark);padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600;margin-bottom:10px;}
    .clist{display:flex;flex-wrap:wrap;gap:5px;}
    .cp{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;}
    .cp.ch{background:#FFE0E0;color:#CC0000;} .cp.ok{background:#E8F5E0;color:#2a7a00;} .cp.nc{background:#FEF3C7;color:#92400E;}
    /* insights */
    .iw{display:flex;flex-direction:column;gap:14px;}
    /* cat summary bar */
    .cat-summary{background:var(--card);border-radius:12px;padding:20px 24px;box-shadow:0 1px 4px rgba(0,0,0,.06);margin-bottom:6px;}
    .cat-summary h3{font-size:14px;font-weight:700;margin-bottom:14px;color:var(--text);}
    .cat-bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
    .cat-bar-label{font-size:13px;font-weight:500;min-width:180px;color:var(--text);}
    .cat-bar-track{flex:1;background:#f0f4e8;border-radius:20px;height:10px;overflow:hidden;}
    .cat-bar-fill{height:100%;border-radius:20px;background:var(--accent);transition:width .5s;}
    .cat-bar-count{font-size:13px;font-weight:700;color:var(--accent-dark);min-width:36px;text-align:right;}
    .ic{background:var(--card);border-radius:12px;padding:20px 24px;box-shadow:0 1px 4px rgba(0,0,0,.06);border-left:5px solid var(--accent);}
    .ic.c1{border-left-color:#E53E3E;} .ic.c2{border-left-color:#DD6B20;} .ic.c3{border-left-color:#D97706;} .ic.c4{border-left-color:#4A90D9;}
    .ih{display:flex;align-items:baseline;gap:14px;margin-bottom:10px;flex-wrap:wrap;}
    .in{font-size:26px;font-weight:900;min-width:36px;}
    .ic.c1 .in{color:#E53E3E;} .ic.c2 .in{color:#DD6B20;} .ic.c3 .in{color:#D97706;} .ic.c4 .in{color:#4A90D9;}
    .it{font-size:16px;font-weight:700;}
    .ifreq{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;white-space:nowrap;}
    .f1{background:#FFE0E0;color:#CC0000;} .f2{background:#FFF0D9;color:#995500;} .f3{background:#FFFBD0;color:#7A5C00;} .f4{background:#F0F0F0;color:#555;}
    .idyn{font-size:12px;font-weight:700;color:var(--accent-dark);background:#eef7e0;padding:3px 10px;border-radius:20px;white-space:nowrap;}
    .ib{font-size:14px;line-height:1.75;color:#444;margin-bottom:8px;}
    .icl{font-size:13px;color:var(--muted);} .icl strong{color:var(--text);}
    .alert-box{background:#FFFBEB;border:1px solid #FCD34D;border-radius:12px;padding:20px 24px;}
    .alert-box h3{font-size:15px;font-weight:700;color:#78350F;margin-bottom:10px;}
    .alert-box p{font-size:14px;line-height:1.8;color:#5a4400;}
    .rec{background:var(--card);border-radius:12px;padding:22px 24px;box-shadow:0 1px 4px rgba(0,0,0,.06);}
    .rec h3{font-size:15px;font-weight:700;margin-bottom:16px;}
    .rg{margin-bottom:14px;} .rg h4{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin-bottom:8px;}
    .ri{display:flex;gap:8px;font-size:14px;line-height:1.65;color:#444;margin-bottom:7px;}
    .ri::before{content:"→";color:var(--accent-dark);font-weight:700;flex-shrink:0;margin-top:1px;}
    /* table */
    .tw{overflow-x:auto;}
    table{width:100%;background:var(--card);border-radius:12px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.06);border-collapse:collapse;}
    th{background:#2a3a1a;color:#fff;padding:11px 14px;text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.5px;}
    td{padding:10px 14px;font-size:13px;border-bottom:1px solid var(--bg);vertical-align:middle;}
    tr:last-child td{border-bottom:none;} tr:hover td{background:#f8faf2;}
    .badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:600;}
    .badge.ch{background:#FFE0E0;color:#CC0000;} .badge.ok{background:#E8F5E0;color:#2a7a00;}
    .scb{background:#FFFBEB;border:1px solid #FCD34D;border-radius:12px;padding:16px 20px;margin-top:16px;}
    .scb h4{color:#78350F;font-size:13px;font-weight:700;margin-bottom:10px;}
    .scpills{display:flex;flex-wrap:wrap;gap:6px;}
    .scp{background:#FEF3C7;color:#78350F;padding:3px 10px;border-radius:20px;font-size:12px;}
    .loading{text-align:center;padding:80px 32px;color:var(--muted);font-size:15px;}
    @media(max-width:900px){.kpis{grid-template-columns:repeat(2,1fr);}.og{grid-template-columns:1fr 1fr;}}
    @media(max-width:600px){.og{grid-template-columns:1fr;}.date-bar,.content,.main-tabs,header{padding-left:16px;padding-right:16px;}.kpis{padding:16px 16px 0;}}
  </style>
</head>
<body>
<header>
  <div>
    <div class="logo">plinng<span>.</span></div>
    <div style="font-size:12px;color:var(--muted);margin-top:2px">Dashboard de Churn — Revenue Ops</div>
  </div>
  <div class="meta" id="meta">Cargando...</div>
</header>

<div class="main-tabs">
  <div class="main-tab active" data-tab="dashboard" onclick="switchTab('dashboard')">📊 Dashboard</div>
  <div class="main-tab" data-tab="tabla" onclick="switchTab('tabla')">📋 Tabla</div>
  <div class="main-tab" data-tab="churns" onclick="switchTab('churns')">🔴 Churns</div>
</div>

<div class="sub-bar" id="sub-bar">
  <div class="sub-tab active" data-sub="insights" onclick="switchSub('insights')">💡 Insights</div>
  <div class="sub-tab" data-sub="owners" onclick="switchSub('owners')">👤 Owners</div>
</div>

<div class="date-bar">
  <label>Período:</label>
  <button class="pbtn" onclick="setPeriod(7,this)">7d</button>
  <button class="pbtn" onclick="setPeriod(30,this)">30d</button>
  <button class="pbtn" onclick="setPeriod(90,this)">3 meses</button>
  <button class="pbtn active" onclick="setPeriod(null,this)">Todo</button>
  <span class="dsep">Desde</span><input type="date" id="f-desde" onchange="applyFilter()"/>
  <span class="dsep">Hasta</span><input type="date" id="f-hasta" onchange="applyFilter()"/>
</div>

<div class="kpis">
  <div class="kpi"><div class="lbl">Total llamadas</div><div class="val" id="m-total">—</div><div class="sub">únicas (deduplicadas)</div></div>
  <div class="kpi red"><div class="lbl">Churn detectado</div><div class="val" id="m-churn">—</div><div class="sub" id="m-cpct"></div></div>
  <div class="kpi grn"><div class="lbl">Sin churn</div><div class="val" id="m-ok">—</div></div>
  <div class="kpi amb"><div class="lbl">Tasa de churn</div><div class="val" id="m-rate">—</div><div class="sub">sobre llamadas totales</div></div>
</div>

<div class="content" id="content"><div class="loading">⏳ Cargando datos...</div></div>

<script>
const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSgZgcbRQZ0sa1BU7Pv1TKwqo_CDyHEPcdcGZF3DtUuH_vNmZsjbrO5puLarjMCDtCsiF0SjIFFk0Jy/pub?output=csv";
const DUENOS = ['Victor Ortega','Oscar Lopo','Martina','Kamila','Gonzalo','Franco'];

const CHURN_KW = ['dar de baja','quiero cancelar','cancelar','no quiero continuar','voy a cancelar',
  'quiero darme de baja','ya no quiero','decido cancelar','solicito la baja','me doy de baja',
  'baja del servicio','no quiero seguir','cancelo','he cancelado','me voy a dar de baja'];

const CAT_KW = {
  'Fallos técnicos':  ['no publica','no sale','no funciona','error','fallo','vinculaci','conecta','lento','carga','instagram','facebook','problema técnico'],
  'Onboarding':       ['no sé cómo','no entiendo','confus','demo','tutorial','aprobaci','flujo','primer','empezar'],
  'Sin resultados':   ['no veo result','no genera','sin ventas','no convierte','inversión','retorno','roi','engagement'],
  'Contenido':        ['contenido','propuesta','genérico','chatgpt','no refleja','no personali','calidad'],
  'Soporte':          ['no responde','sin respuesta','nadie me atiende','soporte','espera','reclamaci'],
  'Facturación':      ['cobro','factura','cargo','precio','no esperaba','sorpresa','reembolso'],
  'Limitaciones':     ['linkedin','catalán','catala','archivo','ordenador','limitaci'],
  'Razones externas': ['crisis','económic','agencia','traslado','tiempo','personal']
};

// Map category name → insight card index (0-based)
const CAT_TO_IDX = {
  'Fallos técnicos':0,'Onboarding':1,'Sin resultados':2,
  'Contenido':3,'Soporte':4,'Facturación':5,'Limitaciones':6,'Razones externas':7
};

function detCat(t){
  if(!t) return 'Sin categoría';
  const s=t.toLowerCase();
  for(const[c,kws]of Object.entries(CAT_KW)) if(kws.some(k=>s.includes(k))) return c;
  return 'Sin categoría';
}
function detChurn(t){
  if(!t) return false;
  const s=t.toLowerCase();
  return CHURN_KW.some(k=>s.includes(k));
}
function norm(s){return(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9 ]/g,' ').replace(/\s+/g,' ').trim();}
function col(row,opts){for(const k of opts){if(row[k]!==undefined)return row[k]||'';}return '';}

let allRows=[],filtered=[],currentTab='dashboard',currentSub='insights';

function switchTab(t){
  currentTab=t;
  document.querySelectorAll('.main-tab').forEach(e=>e.classList.toggle('active',e.dataset.tab===t));
  document.getElementById('sub-bar').style.display=t==='dashboard'?'flex':'none';
  render();
}
function switchSub(s){
  currentSub=s;
  document.querySelectorAll('.sub-tab').forEach(e=>e.classList.toggle('active',e.dataset.sub===s));
  render();
}
function setPeriod(days,btn){
  document.querySelectorAll('.pbtn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  if(!days){document.getElementById('f-desde').value='';document.getElementById('f-hasta').value='';}
  else{
    const now=new Date(),from=new Date(now-days*86400000);
    document.getElementById('f-desde').value=from.toISOString().split('T')[0];
    document.getElementById('f-hasta').value=now.toISOString().split('T')[0];
  }
  applyFilter();
}
function applyFilter(){
  const d=document.getElementById('f-desde').value,h=document.getElementById('f-hasta').value;
  filtered=allRows.filter(r=>{
    if(!d&&!h)return true;
    const f=r._f;if(!f)return true;
    if(d&&f<d)return false;
    if(h&&f>h)return false;
    return true;
  });
  updateKPIs();render();
}

function cargarDatos(){
  Papa.parse(SHEET_CSV_URL,{
    download:true,header:true,skipEmptyLines:true,
    complete:r=>procesarDatos(r.data),
    error:()=>{document.getElementById('content').innerHTML='<div class="loading">❌ Error cargando datos. Verifica la URL del Sheet.</div>';}
  });
}

function procesarDatos(raw){
  const seen=new Set();
  allRows=[];
  raw.forEach(row=>{
    const transcript=col(row,['Transcript','transcript','Transcripcion','transcripcion','Contenido','contenido','Resumen','resumen']);
    const participantes=col(row,['Participantes','participantes','Participants','participants']);
    const duenoBruto=col(row,['Dueño','dueno','Dueno','Owner','owner','Comercial','comercial','Assigned to']);
    const fechaRaw=col(row,['Fecha','fecha','Date','date','Actualizado','actualizado','created_at','Fecha llamada']);
    const nombreBruto=col(row,['Nombre','nombre','Cliente','cliente','Company','company','Empresa','empresa']);
    const churnCol=col(row,['Churn','churn','Es churn','es_churn','Tipo','tipo','Estado','estado','Resultado']);

    // fecha
    let fechaStr='';
    if(fechaRaw){const d=new Date(fechaRaw);if(!isNaN(d))fechaStr=d.toISOString().split('T')[0];}

    // owner — busca en participantes + dueno
    let owner='';
    const search=norm(participantes+' '+duenoBruto);
    for(const d of DUENOS){
      const parts=norm(d).split(' ');
      if(search.includes(norm(d))||search.includes(parts[0])){owner=d;break;}
    }

    // cliente — de nombreBruto o extraído de participantes quitando al owner
    let cliente=nombreBruto.trim();
    if(!cliente&&participantes){
      const rawParts=participantes.split(/\s*\|\s*|\s*,\s*/);
      const nameParts=rawParts.map(p=>{
        const m=p.match(/^\[([^\]]+)\]/);
        return m?m[1].trim():p.replace(/:[^]*/,'').trim();
      }).filter(p=>p.length>1&&p.length<60&&!/^\d+$/.test(p));
      const ownerNorms=DUENOS.map(d=>norm(d).split(' ')[0]);
      cliente=nameParts.find(p=>!ownerNorms.some(on=>norm(p).includes(on)))||nameParts[0]||'';
    }

    // churn
    let isChurn=false;
    if(churnCol){
      const cv=churnCol.toLowerCase();
      isChurn=['sí','si','yes','churn','true','1','cancelado','baja'].some(v=>cv.includes(v));
    } else {
      isChurn=detChurn(transcript);
    }

    const cat=detCat(transcript||nombreBruto);
    const key=norm(cliente)+'_'+fechaStr;
    if(seen.has(key)||!norm(cliente))return;
    seen.add(key);

    allRows.push({cliente,owner,cat,fechaStr,_f:fechaStr,isChurn,snip:transcript.substring(0,200)});
  });

  filtered=[...allRows];
  document.getElementById('meta').innerHTML=
    `Actualizado: ${new Date().toLocaleString('es-ES')}<br>${allRows.length.toLocaleString()} registros`;
  updateKPIs();render();
}

function updateKPIs(){
  const t=filtered.length,ch=filtered.filter(r=>r.isChurn).length,ok=t-ch,rt=t?Math.round(ch/t*100):0;
  document.getElementById('m-total').textContent=t.toLocaleString('es-ES');
  document.getElementById('m-churn').textContent=ch.toLocaleString('es-ES');
  document.getElementById('m-ok').textContent=ok.toLocaleString('es-ES');
  document.getElementById('m-rate').textContent=rt+'%';
  document.getElementById('m-cpct').textContent=t?`${rt}% del total`:'';
}

function render(){
  if(currentTab==='dashboard'){currentSub==='insights'?renderInsights():renderOwners();}
  else if(currentTab==='tabla')renderTabla();
  else renderChurns();
}

// ── INSIGHTS ──────────────────────────────────────────────
function renderInsights(){
  // Contar llamadas por categoría (de filtered)
  const counts={};
  filtered.forEach(r=>{ counts[r.cat]=(counts[r.cat]||0)+1; });
  const total=filtered.length||1;
  const maxCat=Math.max(...Object.values(counts),1);

  // Barra resumen de categorías
  const catOrder=Object.keys(CAT_KW).concat(['Sin categoría']);
  const barRows=catOrder.map(cat=>{
    const n=counts[cat]||0;
    const pct=Math.round(n/total*100);
    const barW=Math.round(n/maxCat*100);
    return `<div class="cat-bar-row">
      <div class="cat-bar-label">${cat}</div>
      <div class="cat-bar-track"><div class="cat-bar-fill" style="width:${barW}%"></div></div>
      <div class="cat-bar-count">${n}<span style="font-size:10px;color:var(--muted);font-weight:400"> (${pct}%)</span></div>
    </div>`;
  }).join('');

  function dynBadge(catName){
    const n=counts[catName]||0;
    return n>0?`<span class="idyn">${n} llamadas</span>`:'';
  }

  document.getElementById('content').innerHTML=`
  <div class="iw">

    <div class="cat-summary">
      <h3>📊 Llamadas por motivo de churn — ${filtered.length.toLocaleString()} registros en el período</h3>
      ${barRows}
    </div>

    <div class="ic c1">
      <div class="ih"><div class="in">1</div><div class="it">Fallos técnicos recurrentes</div><span class="ifreq f1">⚠️ Muy alta frecuencia</span>${dynBadge('Fallos técnicos')}</div>
      <p class="ib">El problema más mencionado en todas las transcripciones. Incluye: publicaciones que no se publican a tiempo o no salen, vinculación fallida con Instagram/Facebook (algunos desde diciembre), errores en el sistema de pagos, carga lenta de la plataforma y cuentas no correctamente conectadas.</p>
      <div class="icl"><strong>Clientes afectados:</strong> Karina, Enrique, Patricia, María (varias), Leticia, Isabel, Yolanda, Heidy.</div>
    </div>

    <div class="ic c2">
      <div class="ih"><div class="in">2</div><div class="it">Onboarding deficiente / confusión de uso</div><span class="ifreq f2">Alta frecuencia</span>${dynBadge('Onboarding')}</div>
      <p class="ib">Muchos clientes no entienden cómo funciona la plataforma después de llevar semanas o meses. No saben solicitar cambios, no entienden el flujo de aprobación de propuestas, no han vinculado sus cuentas. La solución reactiva universal es "hagamos una demo en vivo", lo que indica que el onboarding inicial no es suficiente.</p>
      <div class="icl"><strong>Clientes afectados:</strong> Isabel, prospecta del gimnasio, Ángel, Yolanda, Joaquim, María (odontopediatría).</div>
    </div>

    <div class="ic c2">
      <div class="ih"><div class="in">3</div><div class="it">Bajo valor percibido / ausencia de resultados</div><span class="ifreq f2">Alta frecuencia</span>${dynBadge('Sin resultados')}</div>
      <p class="ib">Clientes que no ven resultados tangibles (ventas, leads, engagement) y sienten que no justifican la inversión. Algunos mencionan que sus propias publicaciones generan más tráfico que las del equipo. Ángel lleva meses sin ver conversión en ventas.</p>
      <div class="icl"><strong>Clientes afectados:</strong> Ángel, Solventana, Virginia, Isabel, Samuel, María (odontopediatría), Laia.</div>
    </div>

    <div class="ic c2">
      <div class="ih"><div class="in">4</div><div class="it">Calidad y relevancia del contenido</div><span class="ifreq f2">Alta frecuencia</span>${dynBadge('Contenido')}</div>
      <p class="ib">Propuestas genéricas que no reflejan el negocio del cliente. Sensación de contenido automatizado sin personalización real ("como un ChatGPT"). Clientes con negocios nicho sienten que la IA no captura su sector.</p>
      <div class="icl"><strong>Clientes afectados:</strong> Ángel, Aikari, María (cancelación), Yolanda, Enrique, Laia.</div>
    </div>

    <div class="ic c2">
      <div class="ih"><div class="in">5</div><div class="it">Comunicación y soporte deficiente</div><span class="ifreq f2">Alta frecuencia</span>${dynBadge('Soporte')}</div>
      <p class="ib">Clientes que sienten que sus solicitudes no se registran, tardan en recibir respuesta, o hablan con múltiples personas sin continuidad. Samuel lleva 20+ propuestas sin feedback. José tiene múltiples reclamaciones sin respuesta y acaba cancelando de forma agresiva.</p>
      <div class="icl"><strong>Clientes afectados:</strong> Karina, Samuel, José, María, Fran, Heidy, Enrique.</div>
    </div>

    <div class="ic c3">
      <div class="ih"><div class="in">6</div><div class="it">Sorpresas en facturación / problemas de pago</div><span class="ifreq f3">Frecuencia media</span>${dynBadge('Facturación')}</div>
      <p class="ib">Cobros inesperados, errores en la gestión de pagos, falta de transparencia sobre condiciones del plan y política de cancelación (20 días de aviso). Miryam cancela principalmente por esto. Patricia se siente engañada por la presentación de la prueba gratuita.</p>
      <div class="icl"><strong>Clientes afectados:</strong> Miryam, Patricia, Heidy, Fran, Karina.</div>
    </div>

    <div class="ic c3">
      <div class="ih"><div class="in">7</div><div class="it">Limitaciones del producto</div><span class="ifreq f3">Frecuencia media</span>${dynBadge('Limitaciones')}</div>
      <p class="ib">La plataforma no gestiona LinkedIn, no permite cargar archivos desde ordenador (solo móvil), y tiene problemas con el catalán (Laia lleva semanas esperando resolución).</p>
      <div class="icl"><strong>Clientes afectados:</strong> Leticia, María (cancelación), Laia.</div>
    </div>

    <div class="ic c4">
      <div class="ih"><div class="in">8</div><div class="it">Razones externas</div><span class="ifreq f4">Frecuencia baja</span>${dynBadge('Razones externas')}</div>
      <p class="ib">Cancelaciones no relacionadas con el servicio: crisis económica (Jero), trabaja con otra agencia (Virginia), falta de tiempo por traslado o cambios vitales (María odontopediatría, Samuel).</p>
    </div>

    <div class="alert-box">
      <h3>⚠️ Patrón crítico detectado</h3>
      <p>Ciclo de deterioro claro: <strong>Fallo técnico → intento de comunicación → sin respuesta → frustración → propuestas bloqueadas → "nada funciona" → cancelación.</strong><br><br>
      La mayoría de los churns no son instantáneos. Las llamadas de seguimiento llegan tarde y se convierten en rescate de emergencia en lugar de gestión proactiva.</p>
    </div>

    <div class="rec">
      <h3>✅ Recomendaciones accionables</h3>
      <div class="rg"><h4>Corto plazo (0–30 días)</h4>
        <div class="ri">Alerta temprana: cliente sin propuestas aprobadas en +10 días, sin cuentas vinculadas tras primera semana, o sin actividad en app en 7 días.</div>
        <div class="ri">Onboarding obligatorio: sesión estructurada en primeros 3 días post-contratación. Evitaría ~40% de los motivos de churn.</div>
        <div class="ri">Estandarizar proceso de cancelación claro — reduce frustración incluso en clientes que se van.</div>
      </div>
      <div class="rg"><h4>Medio plazo (30–90 días)</h4>
        <div class="ri">Feedback estructurado en plataforma (opciones predefinidas por propuesta) para evitar pérdida de información por WhatsApp/mail.</div>
        <div class="ri">Quality Check mensual: cuentas vinculadas, propuestas sin resolver, alineación con el brief.</div>
        <div class="ri">Email de aviso 5–7 días antes del cobro con resumen del mes — retendría casos como Miryam y Patricia.</div>
      </div>
      <div class="rg"><h4>Estratégico</h4>
        <div class="ri">Alinear expectativas desde la venta: los clientes esperan ventas/leads pero el servicio entrega presencia digital. Este gap es el motivo más difícil de resolver.</div>
      </div>
    </div>

  </div>`;
}

// ── OWNERS ────────────────────────────────────────────────
function renderOwners(){
  const od={};
  DUENOS.forEach(d=>{od[d]={total:0,churns:0,cats:{},clients:[]};});
  filtered.forEach(r=>{
    if(!r.owner||!od[r.owner])return;
    const o=od[r.owner];
    o.total++;
    if(r.isChurn)o.churns++;
    if(r.cat&&r.cat!=='Sin categoría')o.cats[r.cat]=(o.cats[r.cat]||0)+1;
    o.clients.push(r);
  });
  const cards=DUENOS.map(name=>{
    const o=od[name];
    const rate=o.total?Math.round(o.churns/o.total*100):0;
    const bc=rate>=50?'br':rate>=25?'ba':'bg';
    const topCat=Object.entries(o.cats).sort((a,b)=>b[1]-a[1])[0];
    const pills=o.clients.sort((a,b)=>(b.isChurn?1:0)-(a.isChurn?1:0)).slice(0,10)
      .map(c=>`<span class="cp ${c.isChurn?'ch':c.cat==='Sin categoría'?'nc':'ok'}">${c.isChurn?'✕':'✓'} ${c.cliente||'—'}</span>`).join('');
    return `<div class="oc ${bc}">
      <div class="oname">${name}</div>
      <div class="orate">${rate}% churn · ${o.total} llamadas</div>
      <div class="ostats">
        <div class="ostat red"><div class="n">${o.churns}</div><div class="l">Churns</div></div>
        <div class="ostat grn"><div class="n">${o.total-o.churns}</div><div class="l">OK</div></div>
      </div>
      ${topCat?`<div class="mtag">⚡ ${topCat[0]}</div>`:''}
      <div style="font-size:11px;color:var(--muted);margin-bottom:6px;font-weight:600;text-transform:uppercase;letter-spacing:.4px">Clientes</div>
      <div class="clist">${pills||'<span style="color:var(--muted);font-size:12px">Sin datos en este período</span>'}</div>
    </div>`;
  }).join('');
  document.getElementById('content').innerHTML=`<div class="og">${cards}</div>`;
}

// ── TABLA ─────────────────────────────────────────────────
function renderTabla(){
  const rows=filtered.slice(0,300);
  const sincat=[...new Set(filtered.filter(r=>r.cat==='Sin categoría').map(r=>r.cliente).filter(Boolean))];
  document.getElementById('content').innerHTML=`
    <div class="tw"><table>
      <thead><tr><th>Owner</th><th>Fecha</th><th>Cliente / Participante</th><th>Categoría</th><th>Churn</th></tr></thead>
      <tbody>${rows.map(r=>`<tr>
        <td>${r.owner||'<span style="color:#bbb">—</span>'}</td>
        <td>${r.fechaStr||'—'}</td>
        <td><strong>${r.cliente||'—'}</strong></td>
        <td>${r.cat}</td>
        <td>${r.isChurn?'<span class="badge ch">Churn</span>':'<span class="badge ok">OK</span>'}</td>
      </tr>`).join('')}</tbody>
    </table></div>
    ${filtered.length>300?`<p style="text-align:center;padding:14px;color:var(--muted);font-size:13px">Mostrando 300 de ${filtered.length} registros</p>`:''}
    ${sincat.length?`<div class="scb"><h4>⚠️ Sin categoría — revisar manualmente (${sincat.length})</h4><div class="scpills">${sincat.map(c=>`<span class="scp">${c}</span>`).join('')}</div></div>`:''}`;
}

// ── CHURNS ────────────────────────────────────────────────
function renderChurns(){
  const ch=filtered.filter(r=>r.isChurn);
  if(!ch.length){document.getElementById('content').innerHTML='<div class="loading">No se detectaron churns en el período seleccionado.</div>';return;}
  document.getElementById('content').innerHTML=`
    <div class="tw"><table>
      <thead><tr><th>Owner</th><th>Fecha</th><th>Cliente / Participante</th><th>Categoría</th><th>Extracto transcript</th></tr></thead>
      <tbody>${ch.map(r=>`<tr>
        <td>${r.owner||'—'}</td>
        <td>${r.fechaStr||'—'}</td>
        <td><strong>${r.cliente||'—'}</strong></td>
        <td>${r.cat}</td>
        <td style="font-size:12px;color:#666;max-width:280px">${(r.snip||'').substring(0,100)}…</td>
      </tr>`).join('')}</tbody>
    </table></div>`;
}

document.getElementById('sub-bar').style.display='flex';
cargarDatos();
