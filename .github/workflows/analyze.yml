name: Análisis Churn (analyze.py)

on:
  workflow_dispatch:   # permite lanzarlo manualmente desde GitHub
  schedule:
    - cron: '0 6 * * *'  # cada día a las 7h (España = UTC+1)

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install gspread pandas anthropic google-auth requests

      - name: Run analyze.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: python analyze.py

      - name: Commit modjo_data.json
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add modjo_data.json
          git diff --cached --quiet || git commit -m "chore: update modjo analysis $(date -u +'%Y-%m-%d')"
          git push
